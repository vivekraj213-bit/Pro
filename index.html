<!-- 🔽 सिर्फ SCRIPT वाला हिस्सा बदलो (बाकी सब same रहेगा) -->

<script>
let records = JSON.parse(localStorage.getItem("harvesterPro")) || [];
let editIndex = -1;
let extraRecords = JSON.parse(localStorage.getItem("extraExpense")) || [];

const addBtn = document.querySelector(".add");
const adminPassword = "1254";

function login(){
  if(user.value=="V" && pass.value=="1"){
    localStorage.setItem("isLogin","true"); // ✅ ADD
    loginPage.style.display="none";
    main.style.display="block";
    show(records);
    showExtra();
  } else {
    alert("कृपया विवेक जी से अनुमति लाइए");
  }
}

function logout(){
  localStorage.removeItem("isLogin"); // ✅ ADD
  main.style.display="none";
  loginPage.style.display="flex";
}

function save(){
  localStorage.setItem("harvesterPro", JSON.stringify(records));
}

function clearFields(){
  date.value="";
  farmer.value="";
  village.value="";
  mobile.value="";
  crop.value="गेहूं";
  acre.value="";
  rate.value="";
  paid.value="";
  commission.value="";
  expense.value="";
}

function addRecord(){
  let total = acre.value * rate.value;
  let due = total - paid.value;

  if(editIndex === -1){
    records.push({
      date:date.value,
      farmer:farmer.value,
      village:village.value,
      mobile:mobile.value,
      crop:crop.value,
      acre:+acre.value,
      rate:+rate.value,
      total:total,
      paid:+paid.value,
      due:due,
      commission:+commission.value || 0,
      expense:+expense.value || 0
    });
  } else {
    records[editIndex] = {
      date:date.value,
      farmer:farmer.value,
      village:village.value,
      mobile:mobile.value,
      crop:crop.value,
      acre:+acre.value,
      rate:+rate.value,
      total:total,
      paid:+paid.value,
      due:due,
      commission:+commission.value || 0,
      expense:+expense.value || 0
    };
    editIndex = -1;
    addBtn.innerText = "Add";
  }

  save();
  show(records);
  clearFields();
}

function show(dataArr){
  let html="";
  let dueHTML="";
  let totalIncome=0, totalPaid=0, totalExpense=0, totalCommission=0;

  dataArr.forEach((r,i)=>{
    totalIncome += r.total;
    totalPaid += r.paid;
    totalExpense += r.expense;
    totalCommission += r.commission || 0;

    if(r.due > 0){
      dueHTML += `<li>
      ${r.farmer} - ₹${r.due}
      <a href="tel:${r.mobile}">📞</a>
      <a href="https://wa.me/91${r.mobile}?text=आपका ₹${r.due} बाकी है">📲</a>
      </li>`;
    }

    html += `<tr>
    <td>${r.date}</td>
    <td>${r.farmer}</td>
    <td>${r.village}</td>
    <td>${r.mobile}</td>
    <td>${r.crop}</td>
    <td>${r.acre}</td>
    <td>${r.total}</td>
    <td>${r.paid}</td>
    <td class="${r.due>0?'dueHighlight':''}">${r.due}</td>
    <td>${r.commission || 0}</td>
    <td>${r.expense}</td>
    <td>
      <button class="edit" onclick="editRecord(${i})">Edit</button>
      <button class="delete" onclick="deleteRecord(${i})">Delete</button>
    </td>
    </tr>`;
  });

  data.innerHTML = html;
  dueList.innerHTML = dueHTML;

  let profitVal = totalPaid - (totalExpense + totalCommission);

  income.innerText = "कुल काम: ₹"+totalIncome;
  paidShow.innerText = "मिला पैसा: ₹"+totalPaid;
  expenseShow.innerText = "खर्चा: ₹"+totalExpense;
  commissionShow.innerText = "कमीशन: ₹"+totalCommission;
  profit.innerText = "मुनाफा: ₹"+profitVal;
}

function deleteRecord(i){
  let pass = prompt("रिकॉर्ड डिलीट करने के लिए पहले विवेक जी से अनुमति लीजिये");
  if(pass !== adminPassword){
    alert("गलत पासवर्ड!");
    return;
  }
  records.splice(i,1);
  save();
  show(records);
}

function editRecord(i){
  let r = records[i];
  date.value=r.date;
  farmer.value=r.farmer;
  village.value=r.village;
  mobile.value=r.mobile;
  crop.value=r.crop;
  acre.value=r.acre;
  rate.value=r.rate;
  paid.value=r.paid;
  commission.value=r.commission || 0;
  expense.value=r.expense;
  editIndex = i;
  addBtn.innerText="Update";
}

function searchData(){
  let val = search.value.toLowerCase();
  let filtered = records.filter(r =>
    r.farmer.toLowerCase().includes(val)
  );
  show(filtered);
}

function filterByDate(){
  let f = fromDate.value;
  let t = toDate.value;
  let filtered = records.filter(r =>
    r.date >= f && r.date <= t
  );
  show(filtered);
}

function downloadExcel(){
  let csv = 'Date,Name,Village,Mobile,Crop,Acre,Rate,Total,Paid,Due,Commission,Expense\n';
  records.forEach(r=>{
    csv += `${r.date},${r.farmer},${r.village},${r.mobile},${r.crop},${r.acre},${r.rate},${r.total},${r.paid},${r.due},${r.commission},${r.expense}\n`;
  });
  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "harvester.csv";
  a.click();
}

/* EXTRA SAME */
function addExtra(){
  let total = +extraRate.value * +extraQty.value;
  extraRecords.push({
    item: extraItem.value,
    rate: +extraRate.value,
    qty: +extraQty.value,
    total: total,
    date: extraDate.value
  });
  localStorage.setItem("extraExpense", JSON.stringify(extraRecords));
  showExtra();
  extraItem.value=""; extraRate.value=""; extraQty.value=""; extraDate.value="";
}

function showExtra(){
  let html = "";
  let totalsByDate = {};
  extraRecords.forEach((r,i)=>{
    html += `<tr>
      <td>${i+1}</td>
      <td>${r.item}</td>
      <td>₹${r.rate}</td>
      <td>${r.qty}</td>
      <td>₹${r.total}</td>
      <td>${r.date}</td>
      <td><button class="delete" onclick="deleteExtra(${i})">Delete</button></td>
    </tr>`;
    if(!totalsByDate[r.date]) totalsByDate[r.date] = 0;
    totalsByDate[r.date] += r.total;
  });
  extraData.innerHTML = html;

  let totalHtml="";
  for(let d in totalsByDate){
    totalHtml += `${d}: ₹${totalsByDate[d]}<br>`;
  }
  extraDayTotal.innerHTML = totalHtml;
}

function deleteExtra(i){
  let pass = prompt("क्या आपने विवेक जी की अनुमति लिया है");
  if(pass !== adminPassword) return;
  extraRecords.splice(i,1);
  localStorage.setItem("extraExpense", JSON.stringify(extraRecords));
  showExtra();
}

// ✅ AUTO LOGIN (MAIN FIX)
window.onload = function(){
  if(localStorage.getItem("isLogin") === "true"){
    loginPage.style.display="none";
    main.style.display="block";
    show(records);
    showExtra();
  } else {
    loginPage.style.display="flex";
    main.style.display="none";
  }
}
</script>
