<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Harvester FINAL PRO MAX</title>

<style>
body {font-family:Arial; margin:0; background:#eef2f7;}
header {background:#1e272e; color:white; padding:15px; text-align:center;}

#loginPage {
display:flex;justify-content:center;align-items:center;
height:100vh;background: linear-gradient(135deg, #667eea, #764ba2);
}
.loginBox {background:white;padding:30px;border-radius:12px;text-align:center;}

.container {padding:15px;}
input, select {padding:10px;margin:5px;border-radius:5px;border:1px solid #ccc;}
button {padding:10px 15px;margin:5px;border:none;border-radius:5px;font-weight:bold;}

.add{background:green;color:white;}
.delete{background:red;color:white;}
.edit{background:orange;color:white;}
.logout{background:black;color:white;}

table {width:100%;border-collapse:collapse;margin-top:20px;}
th, td {border:1px solid #ccc;padding:10px;text-align:center;}
th {background:#2f3640;color:white;}

.card {background:white;padding:15px;margin-top:15px;border-radius:10px;}

.dueHighlight {color:red;font-weight:bold;text-decoration:underline;}
.dueDanger {animation:blink 1s infinite;}
@keyframes blink {50%{opacity:0.3;}}

.paidHighlight {color:green;font-weight:bold;}
.paidFull {color:darkgreen;font-weight:bold;}
.zeroValue {color:gray;}
</style>
</head>

<body>

<header><h2>🚜 Sagar Harvester Company Limited</h2></header>

<div id="loginPage">
<div class="loginBox">
<h2>🔐 Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div class="container" id="main" style="display:none;">

<button class="logout" onclick="logout()">Logout</button>

<!-- DASHBOARD -->
<div class="card" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
<div class="card"><h3>💰 Income</h3><h2 id="dashIncome">₹0</h2></div>
<div class="card"><h3>🟢 Paid</h3><h2 id="dashPaid">₹0</h2></div>
<div class="card"><h3>🔴 Due</h3><h2 id="dashDue">₹0</h2></div>
<div class="card"><h3>💸 Expense</h3><h2 id="dashExpense">₹0</h2></div>
</div>

<!-- ORIGINAL FORM SAME -->
<div class="card">
<input type="date" id="date">
<input type="text" id="farmer" placeholder="किसान">
<input type="text" id="village" placeholder="गांव">
<input type="text" id="mobile" placeholder="मोबाइल">
<select id="crop">
<option>गेहूं</option><option>धान</option>
<option>लाही</option><option>सरसों</option>
</select>
<input type="number" id="acre" placeholder="एकड़">
<input type="number" id="rate" placeholder="रेट">
<input type="number" id="paid" placeholder="मिला पैसा">
<input type="number" id="expense" placeholder="खर्चा">
<button class="add" onclick="addRecord()">Add</button>
</div>

<table>
<tr>
<th>Date</th><th>नाम</th><th>कुल</th>
<th>मिला</th><th>बाकी</th><th>Action</th>
</tr>
<tbody id="data"></tbody>
</table>

<!-- EXTRA EXPENSE -->
<div class="card">
<h3>💰 Extra Expense</h3>
<input id="extraItem" placeholder="Item">
<input id="extraRate" type="number" placeholder="Rate">
<input id="extraQty" type="number" placeholder="Qty">
<input id="extraDate" type="date">
<button onclick="addExtra()">Add</button>

<table>
<tr><th>S.No</th><th>Item</th><th>Total</th><th>Date</th><th></th></tr>
<tbody id="extraData"></tbody>
</table>
<h4 id="extraDayTotal"></h4>
</div>

<script>

// LOGIN REMEMBER
if(localStorage.getItem("login")=="yes"){
loginPage.style.display="none";
main.style.display="block";
}

function login(){
if(user.value=="V" && pass.value=="1"){
localStorage.setItem("login","yes");
loginPage.style.display="none";
main.style.display="block";
show();showExtra();
}
}

function logout(){
localStorage.removeItem("login");
location.reload();
}

let records=JSON.parse(localStorage.getItem("harvesterPro"))||[];
let extraRecords=JSON.parse(localStorage.getItem("extraExpense"))||[];
const adminPassword="admin123";

function save(){
localStorage.setItem("harvesterPro",JSON.stringify(records));
}

function addRecord(){
let total=acre.value*rate.value;
let due=total-paid.value;

records.push({
date:date.value,
farmer:farmer.value,
total:total,
paid:+paid.value,
due:due,
expense:+expense.value||0
});

save();show();
}

function show(){
let html="",ti=0,tp=0,te=0;

records.forEach((r,i)=>{
ti+=r.total;tp+=r.paid;te+=r.expense;

html+=`<tr>
<td>${r.date}</td>
<td>${r.farmer}</td>
<td>₹${r.total}</td>

<td class="${
r.paid==0?'zeroValue':
r.paid>=r.total?'paidFull':'paidHighlight'
}">₹${r.paid}</td>

<td class="${
r.due==0?'zeroValue':
r.due>5000?'dueHighlight dueDanger':'dueHighlight'
}">₹${r.due}</td>

<td><button onclick="del(${i})">Delete</button></td>
</tr>`;
});

data.innerHTML=html;

dashIncome.innerText="₹"+ti;
dashPaid.innerText="₹"+tp;
dashDue.innerText="₹"+(ti-tp);
dashExpense.innerText="₹"+te;
}

function del(i){
let p=prompt("Admin Password:");
if(p!=adminPassword)return alert("Wrong Password");
records.splice(i,1);
save();show();
}

// EXTRA
function addExtra(){
let t=extraRate.value*extraQty.value;
extraRecords.push({item:extraItem.value,total:t,date:extraDate.value});
localStorage.setItem("extraExpense",JSON.stringify(extraRecords));
showExtra();
}

function showExtra(){
let html="",tot={};

extraRecords.forEach((r,i)=>{
html+=`<tr>
<td>${i+1}</td>
<td>${r.item}</td>
<td>₹${r.total}</td>
<td>${r.date}</td>
<td><button onclick="delExtra(${i})">X</button></td>
</tr>`;

tot[r.date]=(tot[r.date]||0)+r.total;
});

extraData.innerHTML=html;

let txt="";
for(let d in tot){txt+=d+" : ₹"+tot[d]+"<br>";}
extraDayTotal.innerHTML=txt;
}

function delExtra(i){
let p=prompt("Admin Password:");
if(p!=adminPassword)return alert("Wrong Password");
extraRecords.splice(i,1);
localStorage.setItem("extraExpense",JSON.stringify(extraRecords));
showExtra();
}

show();
showExtra();

</script>

</body>
</html>
